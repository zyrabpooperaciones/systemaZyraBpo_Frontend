<header class="flex items-center justify-between px-6 py-4 bg-white border-b border-slate-200/80 shadow-xs">
  <!-- Botón de Hamburguesa para pantallas móviles -->
  <div class="flex items-center space-x-3">
    <button 
      (click)="toggleSidebar.emit()" 
      class="p-2 -ml-2 rounded-lg text-slate-500 hover:text-slate-900 hover:bg-slate-100 lg:hidden focus:outline-hidden"
      aria-label="Abrir menú de navegación">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
    
    <!-- Ruta / Breadcrumb decorativo -->
    <div class="hidden sm:flex items-center space-x-2 text-sm text-slate-500 font-medium">
      <span>Zyra BPO</span>
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
      <span class="text-slate-800 font-semibold">Panel de Control</span>
    </div>
  </div>

  <!-- Zona de Usuario y Dropdown -->
  <div class="relative">
    <button 
      (click)="toggleDropdown()" 
      class="flex items-center space-x-3 p-1.5 rounded-full hover:bg-slate-100/80 transition-colors focus:outline-hidden"
      aria-haspopup="true"
      [attr.aria-expanded]="isDropdownOpen()">
      
      <!-- Información del usuario (visible en desktop) -->
      <div class="hidden md:flex flex-col text-right">
        <span class="text-sm font-semibold text-slate-800">
          {{ usuarioActual() ? (usuarioActual()!.nombre + ' ' + usuarioActual()!.apellido) : 'Usuario Zyra' }}
        </span>
        <span class="text-xs text-slate-400 capitalize">{{ usuarioActual()?.cargo || 'Operaciones' }}</span>
      </div>

      <!-- Avatar con iniciales, degradado corporativo naranja/azul -->
      <div class="flex items-center justify-center w-9 h-9 rounded-full bg-linear-to-tr from-orange-500 to-amber-500 text-white font-bold text-sm border-2 border-white shadow-xs">
        {{ getIniciales() }}
      </div>

      <!-- Icono flecha abajo -->
      <svg 
        [class.rotate-180]="isDropdownOpen()"
        class="w-4 h-4 text-slate-400 transition-transform duration-200 hidden md:block" 
        fill="none" 
        stroke="currentColor" 
        viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>

    <!-- Menú Desplegable (Dropdown) con Glassmorphism -->
    <div 
      *ngIf="isDropdownOpen()" 
      class="absolute right-0 mt-2 w-56 rounded-xl border border-slate-200/80 bg-white/95 backdrop-blur-md shadow-lg py-1 z-50 animate-in fade-in slide-in-from-top-1 duration-100">
      
      <!-- Detalle rápido del usuario en móvil -->
      <div class="px-4 py-3 border-b border-slate-100 md:hidden">
        <p class="text-sm font-bold text-slate-800">{{ usuarioActual()?.nombre }} {{ usuarioActual()?.apellido }}</p>
        <p class="text-xs text-slate-400 capitalize">{{ usuarioActual()?.cargo || 'Operaciones' }}</p>
      </div>

      <!-- Opción Perfil -->
      <button 
        (click)="verPerfil()"
        class="flex items-center w-full px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
        <svg class="w-4 h-4 mr-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        Mi Perfil
      </button>

      <!-- Divisor -->
      <div class="h-px bg-slate-100 my-1"></div>

      <!-- Opción Cerrar Sesión (Color Rojo sutil) -->
      <button 
        (click)="logout()"
        class="flex items-center w-full px-4 py-2.5 text-sm text-red-600 hover:bg-red-50/50 transition-colors">
        <svg class="w-4 h-4 mr-2.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </div>
</header>
