<div class="min-h-screen flex items-center justify-center bg-slate-900 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
    
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-white tracking-tight">Zyra BPO</h2>
      <p class="mt-2 text-sm text-slate-400">Ingresa a tu panel operativo seguro</p>
    </div>

    <div *ngIf="mensajeError" class="bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-xl text-sm flex items-center space-x-2 animate-pulse">
      <span class="font-semibold">⚠️</span>
      <span>{{ mensajeError }}</span>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="formularioLogin" (ngSubmit)="alEnviar()">
      <div class="space-y-4">
        
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
          <input formControlName="email" type="email" placeholder="usuario@zyrabpo.com"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
            [ngClass]="{'border-red-500 focus:ring-red-500': formularioLogin.get('email')?.touched && formularioLogin.get('email')?.invalid}">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
            [ngClass]="{'border-red-500 focus:ring-red-500': formularioLogin.get('password')?.touched && formularioLogin.get('password')?.invalid}">
        </div>

      </div>

      <div>
        <button type="submit" [disabled]="formularioLogin.invalid || cargando"
          class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!cargando">Iniciar Sesión</span>
          <span *ngIf="cargando" class="flex items-center space-x-2">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Verificando credenciales...</span>
          </span>
        </button>
      </div>
    </form>

  </div>
</div>
