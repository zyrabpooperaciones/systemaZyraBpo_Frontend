<div class="flex h-screen overflow-hidden bg-slate-50 font-sans antialiased">
  <!-- Sidebar lateral de navegación -->
  <app-sidebar 
    [isOpen]="isSidebarOpen()" 
    (closeSidebar)="closeSidebar()">
  </app-sidebar>

  <!-- Bloque de Contenido Principal -->
  <div 
    [class.lg:pl-64]="isSidebarOpen()"
    [class.lg:pl-20]="!isSidebarOpen()"
    class="flex flex-col flex-1 h-screen overflow-hidden transition-all duration-300 ease-in-out">
    <!-- Header / Barra Superior -->
    <app-header 
      (toggleSidebar)="toggleSidebar()">
    </app-header>

    <!-- Contenido Dinámico de Sub-Módulos -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8">
      <div class="max-w-7xl mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
